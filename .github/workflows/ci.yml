name: CI
on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with: {enable-cache: true}
      - uses: actions/setup-python@v5
        with: {python-version: "3.13"}
      - run: uv sync --project backend --extra dev --locked
      - run: uv run --project backend --extra dev ruff check backend/src backend/tests
      - run: uv run --project backend --extra dev pytest backend/tests
      - run: uv run --project backend python -m sloppy_checker.export_openapi
      - run: git diff --exit-code openapi.json
  extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 24, cache: npm, cache-dependency-path: extension/package-lock.json}
      - run: npm ci
        working-directory: extension
      - run: npm test
        working-directory: extension
      - run: npm run build
        working-directory: extension
      - run: npx playwright install --with-deps chromium
        working-directory: extension
      - run: npm run test:e2e
        working-directory: extension
      - uses: actions/upload-artifact@v4
        with: {name: chromium-extension, path: extension/dist}
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
