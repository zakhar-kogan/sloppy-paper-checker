name: sloppy-paper-checker
services:
  gateway:
    image: caddy:2.10-alpine
    env_file: .env
    ports: ["80:80", "443:443", "443:443/udp"]
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      web: {condition: service_started}
  web:
    build: ./web
    depends_on:
      api: {condition: service_started}
  api:
    build: ./backend
    command: sh -c "alembic upgrade head && uvicorn sloppy_checker.main:app --host 0.0.0.0 --port 8787 --proxy-headers --forwarded-allow-ips=*"
    env_file: .env
    environment:
      SPC_DOCUMENT_STORE: filesystem
      SPC_DOCUMENT_STORE_PATH: /app/data/documents
      SPC_ANALYSIS_DISPATCHER: inline
    ports: ["127.0.0.1:8787:8787"]
    volumes: ["documents:/app/data/documents"]
    depends_on:
      postgres: {condition: service_healthy}
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: paper
      POSTGRES_PASSWORD: paper
      POSTGRES_DB: paper
    volumes: ["postgres:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paper"]
      interval: 5s
      timeout: 3s
      retries: 20
volumes:
  caddy_data:
  caddy_config:
  postgres:
  documents:
